name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, beta]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    env:
      DOCKER_BUILDKIT: 1
      # All deploy secrets are pulled from 1Password by .kamal/secrets.
      # OP_SERVICE_ACCOUNT_TOKEN is the only secret; OP_ACCOUNT/OP_VAULT are
      # plain config that .kamal/secrets interpolates.
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      OP_ACCOUNT: my.1password.com
      OP_VAULT: quantic-prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan 46.224.239.228 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy to production
        if: github.event.workflow_run.head_branch == 'main'
        run: kamal deploy

      - name: Deploy to beta
        if: github.event.workflow_run.head_branch == 'beta'
        run: kamal deploy -d beta
