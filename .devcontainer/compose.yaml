name: "pulse"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - ../..:/workspaces:cached

    env_file:
      - ../.env

    command: sleep infinity

    depends_on:
      - nats

  nats:
    image: nats:2-alpine
    command: "--jetstream --store_dir /data --http_port 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    restart: unless-stopped

volumes:
  nats_data:
