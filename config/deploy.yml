    PHX_SERVER: true
    PHX_HOST: pulse.quantic.es
    PORT: "4000"
    NATS_HOST: dividend-portfolio-nats
    NATS_PORT: "4222"
    NATS_ENV_PREFIX: prod

builder:
  arch: arm64
