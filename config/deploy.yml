service: pulse

image: fleveque/pulse

servers:
  web:
    - 46.224.239.228

proxy:
  ssl: true
  hosts:
    - pulse.quantic.es
  app_port: 4000

registry:
  server: ghcr.io
  username: fleveque
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
